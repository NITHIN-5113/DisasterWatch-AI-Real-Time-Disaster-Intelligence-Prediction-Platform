<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DisasterWatch — Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">
  <script>
    window.API_BASE_URL = window.API_BASE_URL || 'http://localhost:4000/api/v1';
  </script>

  <div class="login-bg">
    <div class="login-scanlines"></div>
    <div class="login-grid"></div>
    <div class="radar-ring r1"></div>
    <div class="radar-ring r2"></div>
    <div class="radar-ring r3"></div>
    <div class="radar-sweep"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="#FF3B3B" stroke-width="2"/>
            <circle cx="20" cy="20" r="10" stroke="#FF3B3B" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="20" cy="20" r="3" fill="#FF3B3B"/>
            <line x1="20" y1="2" x2="20" y2="8" stroke="#FF3B3B" stroke-width="2"/>
            <line x1="20" y1="32" x2="20" y2="38" stroke="#FF3B3B" stroke-width="2"/>
            <line x1="2" y1="20" x2="8" y2="20" stroke="#FF3B3B" stroke-width="2"/>
            <line x1="32" y1="20" x2="38" y2="20" stroke="#FF3B3B" stroke-width="2"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1 class="brand-name">DISASTERWATCH</h1>
          <span class="brand-tagline">Global Threat Intelligence</span>
        </div>
      </div>

      <div class="login-status-bar">
        <span class="status-dot pulse"></span>
        <span class="mono">SYSTEM ONLINE — 247 ACTIVE ALERTS</span>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label">EMAIL / OPERATOR ID</label>
          <input type="text" id="username" class="form-input" placeholder="admin@disasterwatch.dev" autocomplete="username"/>
          <span class="form-error" id="usernameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label">ACCESS CODE</label>
          <div class="input-wrap">
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember"/>
            <span class="checkmark"></span>
            <span>Keep me signed in</span>
          </label>
          <a href="#" class="forgot-link">Forgot access code?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">AUTHENTICATE</span>
          <span class="btn-loader hidden">
            <span></span><span></span><span></span>
          </span>
        </button>

        <p class="login-hint mono">Demo: use <strong>admin@disasterwatch.dev / Admin1234!</strong></p>
      </form>

      <div class="login-footer">
        <span>© 2025 DisasterWatch</span>
        <span>•</span>
        <a href="#">Privacy</a>
        <span>•</span>
        <a href="#">Terms</a>
      </div>
    </div>

    <div class="login-stats">
      <div class="stat-item">
        <span class="stat-num mono" id="earthquakeCount">0</span>
        <span class="stat-label">EARTHQUAKES TODAY</span>
      </div>
      <div class="stat-item">
        <span class="stat-num mono" id="floodCount">0</span>
        <span class="stat-label">FLOOD WARNINGS</span>
      </div>
      <div class="stat-item">
        <span class="stat-num mono" id="stormCount">0</span>
        <span class="stat-label">ACTIVE STORMS</span>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script>
    // Animate stats
    function animateCount(el, target, duration = 1500) {
      let start = 0;
      const step = target / (duration / 16);
      const timer = setInterval(() => {
        start += step;
        if (start >= target) { el.textContent = target; clearInterval(timer); return; }
        el.textContent = Math.floor(start);
      }, 16);
    }
    setTimeout(() => {
      animateCount(document.getElementById('earthquakeCount'), 47);
      animateCount(document.getElementById('floodCount'), 23);
      animateCount(document.getElementById('stormCount'), 12);
    }, 600);

    // Toggle password
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    });

    async function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      let ok = true;

      document.getElementById('usernameError').textContent = '';
      document.getElementById('passwordError').textContent = '';

      if (!email) { document.getElementById('usernameError').textContent = 'Email is required'; ok = false; }
      if (!password) { document.getElementById('passwordError').textContent = 'Access code is required'; ok = false; }
      if (!ok) return;

      const btn = document.getElementById('loginBtn');
      btn.querySelector('.btn-text').classList.add('hidden');
      btn.querySelector('.btn-loader').classList.remove('hidden');
      btn.disabled = true;

      try {
        const result = await DW.api.post('/auth/login', { email, password });
        DW.storage.set('dw_token', result.data.accessToken);
        DW.storage.setUser(result.data.user);
        window.location.href = 'index.html';
      } catch (error) {
        document.getElementById('passwordError').textContent = 'Invalid credentials. Use seeded user credentials.';
      } finally {
        btn.querySelector('.btn-text').classList.remove('hidden');
        btn.querySelector('.btn-loader').classList.add('hidden');
        btn.disabled = false;
      }
    }

    document.getElementById('loginForm').addEventListener('submit', handleLogin);
  </script>
</body>
</html>
